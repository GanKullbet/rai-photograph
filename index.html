<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rai.photograph_</title>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#111;
color:white;
overflow-x:hidden;
}

/* Loading */
.loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
z-index:9999;
transition:1s;
}

/* Navbar */
nav{
position:fixed;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
transition:.4s;
}

nav.active{
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
}

.logo{
font-size:28px;
font-weight:bold;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
text-decoration:none;
color:white;
}

/* Hero */
.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1600") center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:70px;
}

.hero p{
margin:20px 0;
font-size:20px;
}

.btn{
background:#ffc107;
padding:15px 40px;
border-radius:50px;
color:black;
text-decoration:none;
transition:.4s;
}

.btn:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px gold;
}

/* Section */
section{
padding:100px 8%;
}

h2{
text-align:center;
font-size:40px;
margin-bottom:50px;
}

/* Gallery */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.grid img{
width:100%;
border-radius:20px;
cursor:pointer;
transition:.5s;
}

.grid img:hover{
transform:scale(1.05);
}

/* Stats */
.stats{
display:flex;
justify-content:center;
gap:80px;
flex-wrap:wrap;
text-align:center;
}

.number{
font-size:50px;
color:#ffc107;
}

/* Footer */
footer{
background:black;
padding:40px;
text-align:center;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:30px;
right:30px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
text-decoration:none;
color:white;
box-shadow:0 0 20px rgba(0,255,0,.6);
}

/* Lightbox */
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

@media(max-width:768px){

.hero h1{
font-size:45px;
}

nav ul{
display:none;
}

}

</style>
</head>
<body>

<div class="loader">Loading...</div>

<nav id="navbar">
<div class="logo">Rai.photograph</div>

<ul>
<li><a href="#">Beranda</a></li>
<li><a href="#gallery">Galeri</a></li>
</ul>
</nav>

<section class="hero">

<div data-aos="fade-up">
<h1>Capture Beautiful Momen</h1>
<p>Professional Photography</p>
<br>
<a href="#gallery" class="btn">Explore Galleri</a>
</div>

</section>

<section id="gallery">

<h2 data-aos="fade-up">Galleri</h2>

<div class="grid">

<img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=800">

<img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=800">

<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=800">

<img src="https://images.unsplash.com/photo-1510127034890-ba27508e9f1c?w=800">

<img src="https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0?w=800">

<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800">

</div>

</section>

<section id="stats">

<h2 data-aos="fade-up">Pencapaian Kami</h2>

<div class="stats">

<div data-aos="zoom-in">
<div class="number">5</div>
klien
</div>

<div data-aos="zoom-in">
<div class="number">50+</div>
Foto
</div>

<div data-aos="zoom-in">
<div class="number">2 tahun</div>
Pengalaman
</div>

</div>

</section>

<footer>

<h2>Rai.photography_</h2>
<p>Potret Sebuah Kenangan Indah</p>
<br>
Copyright © 2026

</footer>

<a class="whatsapp"
href="https://wa.me/6282299663659">
☎
</a>

<div class="lightbox">
<img src="">
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init();

window.onload=function(){
document.querySelector(".loader").style.opacity="0";
setTimeout(()=>{
document.querySelector(".loader").style.display="none";
},1000);
}

window.addEventListener("scroll",()=>{
if(window.scrollY>50){
navbar.classList.add("active");
}
else{
navbar.classList.remove("active");
}
});

let images=document.querySelectorAll(".grid img");
let lightbox=document.querySelector(".lightbox");
let imgBox=document.querySelector(".lightbox img");

images.forEach(img=>{
img.onclick=()=>{
lightbox.style.display="flex";
imgBox.src=img.src;
}
});

lightbox.onclick=()=>{
lightbox.style.display="none";
}

</script>

</body>
</html>
